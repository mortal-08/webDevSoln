<body>
    
    <div id="radar-screen"></div>
    <script>
        const enemies = [
      { name: "Goblin", distance: 100 },
      { name: "Orc", distance: 50 },
      { name: "Dragon", distance: 10 }
    ];
    
    const updateRadar = () =>{
        const parentEl = document.querySelector("#radar-screen")
        parentEl.innerHTML = ""
        enemies.forEach((obj)=>{
            const newDivEl = document.createElement("div")
            newDivEl.textContent = obj["name"]+" is "+obj.distance+" m away."
            parentEl.appendChild(newDivEl)
        })
    }
    updateRadar()
    </script>
</body>
